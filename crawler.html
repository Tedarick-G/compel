<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ürün Sadeleştir</title>
  <style>
    body{font-family:system-ui;margin:24px;max-width:820px}
    input,button{font:inherit}
    input{width:100%;padding:10px}
    button{padding:10px 14px;margin-top:10px}
    pre{white-space:pre-wrap;background:#f5f5f5;padding:12px;border-radius:8px;margin-top:12px}
  </style>
</head>
<body>
  <h1>Ürün Sadeleştir</h1>

  <input id="u" value="https://compel.com.tr/mikrofonlar/1693-warm-audio-402-wa-19.html#/11-renk-siyah" />
  <div>
    <button id="go">Çek</button>
    <button id="copy" disabled>Kopyala</button>
  </div>
  <pre id="out"></pre>

  <script>
    const WORKER = "https://crawler.tvkapora.workers.dev"; // senin worker
    const out = document.getElementById("out");

    document.getElementById("go").onclick = async () => {
      out.textContent = "Yükleniyor...";
      const u = document.getElementById("u").value.trim();
      const resp = await fetch(`${WORKER}/?u=${encodeURIComponent(u)}&site=${encodeURIComponent("Sesçi Baba")}`);
      out.textContent = await resp.text();
      document.getElementById("copy").disabled = !resp.ok;
    };

    document.getElementById("copy").onclick = async () => {
      await navigator.clipboard.writeText(out.textContent);
    };
  </script>
</body>
</html>
